<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zigbee2MQTT Monitor</title>

  <link rel="stylesheet" href="/local/zigbee2mqtt_monitor/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>

<body>

<header>
  Zigbee2MQTT Monitor
  <div class="toolbar">
    <input id="search" placeholder="Search device">
    <button id="offlineOnly">Offline</button>
    <button id="exportBtn">Export</button>
  </div>
</header>

<div class="container">

  <div class="card">
    <div class="status" id="bridge">Bridge: unknown</div>
    <div id="ota" class="muted"></div>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th data-sort="name">Device</th>
          <th data-sort="status">Status</th>
          <th data-sort="lqi">LQI</th>
          <th data-sort="last_seen">Seen</th>
        </tr>
      </thead>
      <tbody id="devices"></tbody>
    </table>
  </div>

  <div class="card">
    <svg id="net" width="100%" height="280"></svg>
  </div>

</div>

<!-- DEVICE MODAL -->
<div id="modalBg" class="modal-bg" style="display:none;">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <div>
      <input id="renameTo" placeholder="Rename device">
      <button id="renameBtn">Rename</button>
      <button onclick="closeModal()">Close</button>
    </div>

    <canvas id="lqiChart"></canvas>
    <canvas id="rssiChart"></canvas>

    <pre id="modalInfo"></pre>
  </div>
</div>

<script src="/local/zigbee2mqtt_monitor/app.js"></script>
</body>
</html>
