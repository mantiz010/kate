<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kate Arduino IDE</title>
<meta name="theme-color" content="#05080e">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230ea5e9'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='%23020617' font-size='18' font-weight='900'>A</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#05080e;--bg1:#0a0f1a;--bg2:#0f1726;--bg3:#162033;--bg4:#1e2d47;
  --bdr:rgba(56,82,120,.25);--bdr2:rgba(56,82,120,.4);
  --t0:#ffffff;--t1:#e2e8f0;--t2:#8b9ec2;--t3:#5b7099;--t4:#3e5276;
  --ac:#0ea5e9;--ac2:#38bdf8;--ac3:#7dd3fc;--acg:rgba(14,165,233,.06);--aca:rgba(14,165,233,.12);
  --gn:#34d399;--gng:rgba(52,211,153,.08);--gna:rgba(52,211,153,.15);
  --rd:#f87171;--rdg:rgba(248,113,113,.06);
  --am:#fbbf24;--amg:rgba(251,191,36,.06);
  --vt:#a78bfa;
  --r:10px;--rs:6px;
  --sans:'Outfit',system-ui,sans-serif;
  --mono:'Geist Mono','IBM Plex Mono',monospace;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 20px rgba(0,0,0,.15);
}
html,body{height:100%;overflow:hidden;background:var(--bg0);color:var(--t1);font-family:var(--sans)}
::selection{background:var(--aca);color:var(--ac2)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--t4)}
button{cursor:pointer;border:none;background:none;color:inherit;font-family:inherit}

/* Layout */
.app{display:grid;grid-template-rows:48px 1fr;grid-template-columns:260px 1fr;height:100vh}

/* Toolbar */
.toolbar{grid-column:1/-1;display:flex;align-items:center;gap:8px;padding:0 16px;
  background:linear-gradient(180deg,rgba(10,15,26,.95),rgba(5,8,14,.98));
  border-bottom:1px solid var(--bdr);z-index:100;position:relative}
.toolbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(14,165,233,.15) 20%,rgba(14,165,233,.15) 80%,transparent)}

.brand{display:flex;align-items:center;gap:10px;margin-right:8px}
.brand-icon{width:30px;height:30px;border-radius:7px;
  background:linear-gradient(135deg,#38bdf8,#0ea5e9,#0284c7);
  display:grid;place-items:center;font-weight:900;font-size:12px;color:#020617;
  box-shadow:0 0 20px rgba(14,165,233,.2)}
.brand-text{font-size:13px;font-weight:700;letter-spacing:1px;color:var(--t2)}
.brand-sub{font-size:10px;color:var(--t4);margin-left:4px;font-weight:400}

.tb-sep{width:1px;height:24px;background:var(--bdr2);margin:0 4px}

.tb-select{background:var(--bg2);border:1px solid var(--bdr);color:var(--t1);font-family:var(--mono);
  font-size:11px;padding:4px 8px;border-radius:var(--rs);outline:none;min-width:80px}
.tb-select:focus{border-color:var(--ac)}
.tb-select option{background:var(--bg1);color:var(--t1)}

.tb-btn{display:flex;align-items:center;gap:6px;padding:5px 14px;border-radius:var(--rs);
  font-size:11px;font-weight:600;transition:all .15s;border:1px solid transparent}
.tb-btn:hover{background:var(--bg3)}
.tb-btn.primary{background:linear-gradient(135deg,rgba(14,165,233,.15),rgba(14,165,233,.08));
  border-color:rgba(14,165,233,.3);color:var(--ac2)}
.tb-btn.primary:hover{background:linear-gradient(135deg,rgba(14,165,233,.25),rgba(14,165,233,.15));
  box-shadow:0 0 12px rgba(14,165,233,.15)}
.tb-btn.success{background:linear-gradient(135deg,rgba(52,211,153,.15),rgba(52,211,153,.08));
  border-color:rgba(52,211,153,.3);color:var(--gn)}
.tb-btn.success:hover{background:linear-gradient(135deg,rgba(52,211,153,.25),rgba(52,211,153,.15));
  box-shadow:0 0 12px rgba(52,211,153,.15)}
.tb-btn.warn{background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(251,191,36,.06));
  border-color:rgba(251,191,36,.3);color:var(--am)}
.tb-btn.warn:hover{background:linear-gradient(135deg,rgba(251,191,36,.2),rgba(251,191,36,.12))}
.tb-btn.kate{background:linear-gradient(135deg,rgba(167,139,250,.12),rgba(167,139,250,.06));
  border-color:rgba(167,139,250,.3);color:var(--vt)}
.tb-btn.kate:hover{background:linear-gradient(135deg,rgba(167,139,250,.2),rgba(167,139,250,.12))}

.tb-btn svg{width:14px;height:14px}
.tb-btn.disabled{opacity:.4;pointer-events:none}

.project-name{font-size:12px;font-weight:600;color:var(--t2);margin:0 4px;max-width:200px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.spacer{flex:1}

.status-dot{width:7px;height:7px;border-radius:50%;background:var(--gn);
  box-shadow:0 0 8px var(--gn);animation:glow 2s infinite}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.3}}
.status-text{font-size:10px;color:var(--t3);font-family:var(--mono)}

/* Sidebar */
.sidebar{background:var(--bg1);border-right:1px solid var(--bdr);overflow-y:auto;
  display:flex;flex-direction:column}
.sidebar-header{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--bdr)}
.sidebar-header h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--t3)}
.sidebar-header button{font-size:10px;color:var(--ac2);padding:2px 8px;border-radius:var(--rs);
  transition:all .15s}
.sidebar-header button:hover{background:var(--acg)}

.sidebar-search{padding:8px 12px}
.sidebar-search input{width:100%;background:var(--bg2);border:1px solid var(--bdr);color:var(--t1);
  font-size:11px;padding:6px 10px;border-radius:var(--rs);outline:none;font-family:var(--mono)}
.sidebar-search input:focus{border-color:var(--ac)}
.sidebar-search input::placeholder{color:var(--t4)}

.file-tree{flex:1;overflow-y:auto;padding:4px 0}
.tree-item{display:flex;align-items:center;gap:8px;padding:5px 14px;cursor:pointer;
  font-size:12px;transition:background .1s;border-left:2px solid transparent}
.tree-item:hover{background:var(--bg2)}
.tree-item.active{background:var(--acg);border-left-color:var(--ac);color:var(--ac2)}
.tree-item.project{font-weight:600;color:var(--t2);padding:8px 14px}
.tree-item.project svg{color:var(--am)}
.tree-item.file svg{color:var(--ac2)}
.tree-item.expanded svg.chevron{transform:rotate(90deg)}
.tree-item svg{width:14px;height:14px;flex-shrink:0;transition:transform .15s}
.tree-item .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-item.file{padding-left:28px}

.sidebar-loading{display:flex;align-items:center;justify-content:center;padding:20px;
  color:var(--t3);font-size:11px;gap:8px}
.spinner{width:14px;height:14px;border:2px solid var(--bg4);border-top-color:var(--ac);
  border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Main area */
.main-area{display:flex;flex-direction:column;overflow:hidden;position:relative}

/* Tab bar for open files */
.tab-bar{display:flex;align-items:center;background:var(--bg1);border-bottom:1px solid var(--bdr);
  min-height:32px;overflow-x:auto}
.tab{display:flex;align-items:center;gap:6px;padding:6px 14px;font-size:11px;color:var(--t3);
  border-right:1px solid var(--bdr);cursor:pointer;transition:all .15s;white-space:nowrap;
  font-family:var(--mono);position:relative}
.tab:hover{color:var(--t2);background:var(--bg2)}
.tab.active{color:var(--ac2);background:var(--bg2)}
.tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--ac)}
.tab .close{width:14px;height:14px;display:grid;place-items:center;border-radius:3px;
  opacity:0;transition:all .1s;font-size:10px}
.tab:hover .close{opacity:.6}
.tab .close:hover{opacity:1;background:var(--bg4)}
.tab.modified .name::after{content:'';display:inline-block;width:6px;height:6px;
  border-radius:50%;background:var(--am);margin-left:6px;vertical-align:middle}

/* Editor */
#editor-container{flex:1;overflow:hidden;position:relative}

/* Resize handle */
.resize-handle{height:4px;background:var(--bdr);cursor:ns-resize;position:relative;z-index:10;
  transition:background .15s}
.resize-handle:hover,.resize-handle.active{background:var(--ac);box-shadow:0 0 8px rgba(14,165,233,.3)}

/* Output panel */
.output-panel{background:var(--bg1);border-top:1px solid var(--bdr);display:flex;flex-direction:column;
  min-height:32px;overflow:hidden}
.output-header{display:flex;align-items:center;gap:8px;padding:6px 14px;
  border-bottom:1px solid var(--bdr);flex-shrink:0}
.output-header h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--t3)}
.output-tabs{display:flex;gap:2px;margin-left:8px}
.output-tab{font-size:10px;padding:2px 10px;border-radius:var(--rs);color:var(--t3);
  font-weight:600;transition:all .15s}
.output-tab:hover{color:var(--t2);background:var(--bg2)}
.output-tab.active{color:var(--ac2);background:var(--acg)}
.output-clear{margin-left:auto;font-size:10px;color:var(--t4);padding:2px 8px;
  border-radius:var(--rs);transition:all .15s}
.output-clear:hover{color:var(--t2);background:var(--bg3)}

.output-content{flex:1;overflow-y:auto;padding:8px 14px;font-family:var(--mono);font-size:11px;
  line-height:1.6;white-space:pre-wrap;word-break:break-all}
.output-content .line{display:block}
.output-content .line.error{color:var(--rd)}
.output-content .line.success{color:var(--gn)}
.output-content .line.warning{color:var(--am)}
.output-content .line.info{color:var(--t2)}
.output-content .line.clickable{cursor:pointer;text-decoration:underline;text-decoration-style:dotted}
.output-content .line.clickable:hover{color:var(--ac2)}

/* New project modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;
  align-items:center;justify-content:center;backdrop-filter:blur(4px);opacity:0;
  pointer-events:none;transition:opacity .2s}
.modal-overlay.visible{opacity:1;pointer-events:all}
.modal{background:var(--bg1);border:1px solid var(--bdr2);border-radius:var(--r);
  padding:24px;width:400px;max-width:90vw;box-shadow:var(--shadow)}
.modal h2{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--t0)}
.modal label{display:block;font-size:11px;font-weight:600;color:var(--t3);margin-bottom:6px;
  text-transform:uppercase;letter-spacing:1px}
.modal input,.modal select{width:100%;background:var(--bg2);border:1px solid var(--bdr);
  color:var(--t1);font-size:13px;padding:8px 12px;border-radius:var(--rs);outline:none;
  font-family:var(--mono);margin-bottom:16px}
.modal input:focus,.modal select:focus{border-color:var(--ac)}
.modal .actions{display:flex;gap:8px;justify-content:flex-end}
.modal .actions button{padding:8px 20px;border-radius:var(--rs);font-size:12px;font-weight:600}
.modal .actions .cancel{color:var(--t3);border:1px solid var(--bdr)}
.modal .actions .cancel:hover{background:var(--bg3)}
.modal .actions .create{background:var(--ac);color:#020617}
.modal .actions .create:hover{background:var(--ac2)}

/* Ask Kate modal */
.kate-panel{position:fixed;right:16px;top:60px;width:400px;max-height:70vh;
  background:var(--bg1);border:1px solid var(--bdr2);border-radius:var(--r);
  box-shadow:var(--shadow);z-index:500;display:flex;flex-direction:column;
  opacity:0;pointer-events:none;transform:translateY(-10px);transition:all .2s}
.kate-panel.visible{opacity:1;pointer-events:all;transform:translateY(0)}
.kate-panel-header{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--bdr)}
.kate-panel-header h3{font-size:13px;font-weight:700;color:var(--vt)}
.kate-panel-body{flex:1;overflow-y:auto;padding:12px 16px;font-size:12px;line-height:1.6;
  font-family:var(--mono);color:var(--t2);white-space:pre-wrap}
.kate-panel-footer{padding:8px 16px;border-top:1px solid var(--bdr);display:flex;gap:8px}
.kate-panel-footer input{flex:1;background:var(--bg2);border:1px solid var(--bdr);color:var(--t1);
  font-size:12px;padding:6px 10px;border-radius:var(--rs);outline:none;font-family:var(--mono)}
.kate-panel-footer input:focus{border-color:var(--vt)}
.kate-panel-footer button{padding:6px 14px;border-radius:var(--rs);font-size:11px;font-weight:600;
  background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.3);color:var(--vt)}
.kate-panel-footer button:hover{background:rgba(167,139,250,.25)}
</style>
</head>
<body>

<div class="app">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="brand">
      <div class="brand-icon">A</div>
      <span class="brand-text">Kate IDE<span class="brand-sub">Arduino</span></span>
    </div>
    <div class="tb-sep"></div>
    <span class="project-name" id="projectName">No Project</span>
    <div class="tb-sep"></div>

    <select class="tb-select" id="boardSelect" title="Board">
      <option value="esp32:esp32:esp32">ESP32</option>
      <option value="esp32:esp32:esp32s3">ESP32-S3</option>
      <option value="esp32:esp32:esp32c3">ESP32-C3</option>
      <option value="esp8266:esp8266:nodemcuv2">ESP8266 NodeMCU</option>
      <option value="arduino:avr:uno">Arduino Uno</option>
      <option value="arduino:avr:mega">Arduino Mega</option>
      <option value="arduino:avr:nano">Arduino Nano</option>
      <option value="arduino:avr:leonardo">Arduino Leonardo</option>
    </select>

    <select class="tb-select" id="portSelect" title="Port">
      <option value="">No Port</option>
    </select>

    <button class="tb-btn" id="refreshPortsBtn" title="Refresh Ports">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
    </button>

    <div class="tb-sep"></div>

    <button class="tb-btn success" id="compileBtn" title="Compile (Ctrl+B)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      Compile
    </button>

    <button class="tb-btn warn" id="uploadBtn" title="Upload (Ctrl+U)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Upload
    </button>

    <div class="tb-sep"></div>

    <button class="tb-btn primary" id="newProjectBtn" title="New Project">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      New
    </button>

    <div class="spacer"></div>

    <button class="tb-btn kate" id="askKateBtn" title="Ask Kate AI">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Ask Kate
    </button>

    <div class="tb-sep"></div>
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Ready</span>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>Projects</h3>
      <button id="refreshProjectsBtn">Refresh</button>
    </div>
    <div class="sidebar-search">
      <input type="text" placeholder="Search projects..." id="searchInput">
    </div>
    <div class="file-tree" id="fileTree">
      <div class="sidebar-loading" id="sidebarLoading">
        <div class="spinner"></div>
        Loading projects...
      </div>
    </div>
  </div>

  <!-- Main Area -->
  <div class="main-area">
    <div class="tab-bar" id="tabBar">
      <div class="tab" style="color:var(--t4);cursor:default;font-style:italic">No files open</div>
    </div>
    <div id="editor-container"></div>
    <div class="resize-handle" id="resizeHandle"></div>
    <div class="output-panel" id="outputPanel" style="height:200px">
      <div class="output-header">
        <h3>Output</h3>
        <div class="output-tabs">
          <button class="output-tab active" data-tab="output">Output</button>
          <button class="output-tab" data-tab="problems">Problems</button>
        </div>
        <button class="output-clear" id="clearOutput">Clear</button>
      </div>
      <div class="output-content" id="outputContent"><span class="line info">Kate Arduino IDE ready. Select a project to begin.</span></div>
    </div>
  </div>
</div>

<!-- New Project Modal -->
<div class="modal-overlay" id="newProjectModal">
  <div class="modal">
    <h2>New Arduino Project</h2>
    <label>Project Name</label>
    <input type="text" id="newProjectName" placeholder="MyProject">
    <label>Board</label>
    <select id="newProjectBoard">
      <option value="esp32">ESP32</option>
      <option value="esp8266">ESP8266</option>
      <option value="uno">Arduino Uno</option>
      <option value="mega">Arduino Mega</option>
    </select>
    <div class="actions">
      <button class="cancel" id="cancelNewProject">Cancel</button>
      <button class="create" id="createNewProject">Create Project</button>
    </div>
  </div>
</div>

<!-- Ask Kate Panel -->
<div class="kate-panel" id="katePanel">
  <div class="kate-panel-header">
    <h3>Ask Kate AI</h3>
    <button id="closeKatePanel" style="color:var(--t3)">&times;</button>
  </div>
  <div class="kate-panel-body" id="katePanelBody">Ask Kate anything about your code...</div>
  <div class="kate-panel-footer">
    <input type="text" id="kateInput" placeholder="Ask about your code...">
    <button id="kateSend">Send</button>
  </div>
</div>

<!-- Monaco Editor -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
<script>
(function(){
'use strict';

// ── Config ────────────────────────────────────────────────
const API_BASE = 'http://172.168.1.25:3201';
const AUTOSAVE_DELAY = 2000;

// ── State ─────────────────────────────────────────────────
let editor = null;
let currentProject = null;     // project name
let currentFilePath = null;    // full path of open file
let openTabs = [];             // [{path, name, project, modified}]
let projects = [];             // list of project names
let projectFiles = {};         // {projectName: [filenames]}
let saveTimer = null;
let outputHeight = 200;
let isResizing = false;

// ── DOM refs ──────────────────────────────────────────────
const $fileTree = document.getElementById('fileTree');
const $sidebarLoading = document.getElementById('sidebarLoading');
const $tabBar = document.getElementById('tabBar');
const $outputContent = document.getElementById('outputContent');
const $outputPanel = document.getElementById('outputPanel');
const $projectName = document.getElementById('projectName');
const $boardSelect = document.getElementById('boardSelect');
const $portSelect = document.getElementById('portSelect');
const $statusDot = document.getElementById('statusDot');
const $statusText = document.getElementById('statusText');
const $searchInput = document.getElementById('searchInput');

// ── API helper ────────────────────────────────────────────
async function kateAPI(content) {
  setStatus('busy', 'Sending...');
  try {
    const res = await fetch(API_BASE + '/api/message', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({content})
    });
    const data = await res.json();
    setStatus('ok', 'Ready');
    return data.response || data.error || '';
  } catch(e) {
    setStatus('error', 'Connection error');
    appendOutput('Failed to reach Kate API: ' + e.message, 'error');
    return '';
  }
}

function setStatus(state, text) {
  const dot = $statusDot;
  dot.style.background = state === 'ok' ? 'var(--gn)' : state === 'busy' ? 'var(--am)' : 'var(--rd)';
  dot.style.boxShadow = `0 0 8px ${state === 'ok' ? 'var(--gn)' : state === 'busy' ? 'var(--am)' : 'var(--rd)'}`;
  dot.style.animation = state === 'busy' ? 'glow .8s infinite' : state === 'ok' ? 'glow 2s infinite' : 'none';
  $statusText.textContent = text;
}

// ── Output panel ──────────────────────────────────────────
function appendOutput(text, type='info') {
  const line = document.createElement('span');
  line.className = 'line ' + type;

  // Check for file:line patterns for clickable errors
  const lineMatch = text.match(/(\S+\.(ino|cpp|c|h|hpp)):(\d+)/);
  if (lineMatch && type === 'error') {
    line.classList.add('clickable');
    line.dataset.line = lineMatch[3];
    line.addEventListener('click', () => {
      if (editor) {
        const ln = parseInt(lineMatch[3]);
        editor.revealLineInCenter(ln);
        editor.setPosition({lineNumber: ln, column: 1});
        editor.focus();
      }
    });
  }

  line.textContent = text + '\n';
  $outputContent.appendChild(line);
  $outputContent.scrollTop = $outputContent.scrollHeight;
}

function clearOutput() {
  $outputContent.innerHTML = '';
}

function parseAndAppendOutput(response, context) {
  if (!response) {
    appendOutput(context + ': No response from Kate', 'error');
    return;
  }
  const lines = response.split('\n');
  for (const line of lines) {
    const lower = line.toLowerCase();
    if (lower.includes('error') || lower.includes('failed') || lower.includes('fatal')) {
      appendOutput(line, 'error');
    } else if (lower.includes('warning') || lower.includes('warn')) {
      appendOutput(line, 'warning');
    } else if (lower.includes('success') || lower.includes('done') || lower.includes('uploaded') || lower.includes('compiled')) {
      appendOutput(line, 'success');
    } else {
      appendOutput(line, 'info');
    }
  }
}

// ── Project loading ───────────────────────────────────────
async function loadProjects() {
  $sidebarLoading.style.display = 'flex';
  const response = await kateAPI('list my arduino projects');
  $sidebarLoading.style.display = 'none';

  if (!response) return;

  // Parse project names from response
  // Kate's arduino_list_projects returns lines like "  • ProjectName" or "  - ProjectName"
  projects = [];
  const lines = response.split('\n');
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    // Match bullet points: •, -, *, or numbered lists
    const bulletMatch = trimmed.match(/^[•\-\*]\s+(.+)/);
    const dirMatch = trimmed.match(/^(\w[\w\-_.]+)\/?$/);
    const numberedMatch = trimmed.match(/^\d+[\.\)]\s+(.+)/);

    let name = null;
    if (bulletMatch) name = bulletMatch[1].trim();
    else if (dirMatch) name = dirMatch[1];
    else if (numberedMatch) name = numberedMatch[1].trim();

    if (name) {
      // Clean: remove trailing slashes, take first word if has description
      name = name.replace(/\/$/, '').split(/\s+[-—(]/)[0].trim();
      if (name && name.length > 0 && name.length < 60 && /^[A-Za-z0-9]/.test(name) && !name.includes(':')) {
        projects.push(name);
      }
    }
  }

  // Deduplicate
  projects = [...new Set(projects)];
  renderFileTree();
}

function renderFileTree(filter='') {
  $fileTree.innerHTML = '';
  const filtered = filter
    ? projects.filter(p => p.toLowerCase().includes(filter.toLowerCase()))
    : projects;

  if (filtered.length === 0) {
    $fileTree.innerHTML = '<div style="padding:20px;text-align:center;color:var(--t4);font-size:11px">' +
      (projects.length === 0 ? 'No projects found' : 'No matches') + '</div>';
    return;
  }

  for (const proj of filtered) {
    const item = document.createElement('div');
    item.className = 'tree-item project';
    item.innerHTML = `<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>` +
      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>` +
      `<span class="name">${proj}</span>`;
    item.addEventListener('click', () => toggleProject(proj, item));
    $fileTree.appendChild(item);

    // If already expanded, show files
    if (projectFiles[proj]) {
      item.classList.add('expanded');
      renderProjectFiles(proj);
    }
  }
}

async function toggleProject(projName, el) {
  if (projectFiles[projName]) {
    // Collapse
    delete projectFiles[projName];
    renderFileTree($searchInput.value);
    return;
  }

  // Expand: load files
  setStatus('busy', 'Loading ' + projName + '...');
  const response = await kateAPI('list directory ~/Arduino/' + projName);

  if (!response) return;

  // Parse file list from response
  const files = [];
  const lines = response.split('\n');
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    // Match file names with extensions
    const fileMatch = trimmed.match(/([A-Za-z0-9_\-]+\.[A-Za-z0-9]+)/);
    if (fileMatch) {
      const fname = fileMatch[1];
      // Filter to relevant file types
      if (/\.(ino|cpp|c|h|hpp|txt|json|yaml|yml|cfg|md|py|sh)$/i.test(fname)) {
        files.push(fname);
      }
    }
  }

  projectFiles[projName] = [...new Set(files)];
  currentProject = projName;
  $projectName.textContent = projName;
  renderFileTree($searchInput.value);
}

function renderProjectFiles(projName) {
  // Files are rendered inline in renderFileTree — this just finds the project node
  // and inserts files right after it
  const files = projectFiles[projName] || [];
  const projNodes = $fileTree.querySelectorAll('.tree-item.project');
  let projNode = null;
  projNodes.forEach(n => { if (n.querySelector('.name').textContent === projName) projNode = n; });
  if (!projNode) return;

  // Insert files right after the project node
  let insertAfter = projNode;
  for (const fname of files) {
    const item = document.createElement('div');
    item.className = 'tree-item file';
    const filePath = '~/Arduino/' + projName + '/' + fname;
    if (currentFilePath === filePath) item.classList.add('active');

    const ext = fname.split('.').pop().toLowerCase();
    let icon;
    if (ext === 'ino') icon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>';
    else if (['cpp','c','h','hpp'].includes(ext)) icon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>';
    else icon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';

    item.innerHTML = icon + `<span class="name">${fname}</span>`;
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      openFile(projName, fname);
    });

    if (insertAfter.nextSibling) {
      $fileTree.insertBefore(item, insertAfter.nextSibling);
    } else {
      $fileTree.appendChild(item);
    }
    insertAfter = item;
  }
}

// ── File operations ───────────────────────────────────────
async function openFile(projName, fileName) {
  const filePath = '~/Arduino/' + projName + '/' + fileName;
  currentProject = projName;
  $projectName.textContent = projName;

  // Check if already open in a tab
  const existingTab = openTabs.find(t => t.path === filePath);
  if (existingTab) {
    switchToTab(filePath);
    return;
  }

  setStatus('busy', 'Reading ' + fileName + '...');
  const response = await kateAPI('read file ' + filePath);

  if (!response) return;

  // Extract file content from response
  // Kate's read_file returns raw content, but the model may wrap it in explanation
  let content = response;

  // Try to extract code from markdown code blocks first
  const codeBlockMatch = content.match(/```(?:cpp|c|ino|h|arduino)?\n?([\s\S]*?)```/);
  if (codeBlockMatch) {
    content = codeBlockMatch[1];
  } else {
    // If response starts with common Arduino patterns, it's raw code
    const codePatterns = /^(#include|\/\/|\/\*|#define|#pragma|void\s|int\s|float\s|char\s|const\s|struct\s|class\s|enum\s|typedef\s|namespace\s)/m;
    if (codePatterns.test(content)) {
      // Strip any leading text before the first code line
      const firstCodeLine = content.split('\n').findIndex(l => codePatterns.test(l.trim()));
      if (firstCodeLine > 0 && firstCodeLine < 3) {
        content = content.split('\n').slice(firstCodeLine).join('\n');
      }
    }
  }

  content = content.trim();

  // Add to open tabs
  openTabs.push({
    path: filePath,
    name: fileName,
    project: projName,
    modified: false,
    content: content
  });

  switchToTab(filePath);
  renderTabs();
  renderFileTree($searchInput.value);
}

function switchToTab(filePath) {
  // Save current editor content to the outgoing tab before switching
  if (editor && currentFilePath) {
    const outgoingTab = openTabs.find(t => t.path === currentFilePath);
    if (outgoingTab) {
      outgoingTab.content = editor.getValue();
    }
  }

  currentFilePath = filePath;
  const tab = openTabs.find(t => t.path === filePath);
  if (!tab) return;

  currentProject = tab.project;
  $projectName.textContent = tab.project;

  if (editor) {
    editor.setValue(tab.content);
    const ext = tab.name.split('.').pop().toLowerCase();
    const lang = ['cpp','c','h','hpp','ino'].includes(ext) ? 'cpp' : ext === 'py' ? 'python' : ext === 'json' ? 'json' : 'plaintext';
    monaco.editor.setModelLanguage(editor.getModel(), lang);
  }

  renderTabs();
  renderFileTree($searchInput.value);
}

function closeTab(filePath) {
  const idx = openTabs.findIndex(t => t.path === filePath);
  if (idx === -1) return;
  openTabs.splice(idx, 1);

  if (currentFilePath === filePath) {
    if (openTabs.length > 0) {
      switchToTab(openTabs[Math.min(idx, openTabs.length - 1)].path);
    } else {
      currentFilePath = null;
      if (editor) editor.setValue('// No file open\n// Select a file from the sidebar to begin editing.');
      renderTabs();
    }
  } else {
    renderTabs();
  }
}

function renderTabs() {
  $tabBar.innerHTML = '';
  if (openTabs.length === 0) {
    $tabBar.innerHTML = '<div class="tab" style="color:var(--t4);cursor:default;font-style:italic">No files open</div>';
    return;
  }
  for (const tab of openTabs) {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.path === currentFilePath ? ' active' : '') + (tab.modified ? ' modified' : '');
    el.innerHTML = `<span class="name">${tab.name}</span><span class="close">&times;</span>`;
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('close')) {
        closeTab(tab.path);
      } else {
        switchToTab(tab.path);
      }
    });
    $tabBar.appendChild(el);
  }
}

// ── Auto-save ─────────────────────────────────────────────
function scheduleAutoSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(autoSave, AUTOSAVE_DELAY);
}

async function autoSave() {
  if (!currentFilePath || !editor) return;
  const tab = openTabs.find(t => t.path === currentFilePath);
  if (!tab || !tab.modified) return;

  const content = editor.getValue();
  tab.content = content;

  // Resolve ~ to full path for reliable writes
  const fullPath = currentFilePath.replace('~/', '/home/mantiz010/');

  setStatus('busy', 'Saving...');
  // Use the write_file tool directly with explicit path and content
  try {
    const res = await fetch(API_BASE + '/api/message', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({content: 'write_file path=' + fullPath + ' content=```\n' + content + '\n```'})
    });
    const data = await res.json();
    // Check if write succeeded
    if (data.response && (data.response.includes('written') || data.response.includes('Written') || data.response.includes('saved'))) {
      tab.modified = false;
      renderTabs();
      setStatus('ok', 'Saved');
    } else {
      // Fallback: try natural language
      await kateAPI('write this exact code to ' + currentFilePath + ':\n```\n' + content + '\n```');
      tab.modified = false;
      renderTabs();
      setStatus('ok', 'Saved');
    }
  } catch(e) {
    setStatus('error', 'Save failed');
    appendOutput('Save failed: ' + e.message, 'error');
  }
}

// ── Compile ───────────────────────────────────────────────
async function compile() {
  if (!currentProject) {
    appendOutput('No project selected. Open a project first.', 'error');
    return;
  }

  // Save first
  if (editor && currentFilePath) {
    const tab = openTabs.find(t => t.path === currentFilePath);
    if (tab) {
      tab.content = editor.getValue();
      if (tab.modified) await autoSave();
    }
  }

  const board = $boardSelect.value;
  appendOutput('', 'info');
  appendOutput('=== Compiling ' + currentProject + ' for ' + board + ' ===', 'info');

  const response = await kateAPI('compile project ' + currentProject + ' board=' + board);
  parseAndAppendOutput(response, 'Compile');
}

// ── Upload ────────────────────────────────────────────────
async function upload() {
  if (!currentProject) {
    appendOutput('No project selected.', 'error');
    return;
  }
  const port = $portSelect.value;
  if (!port) {
    appendOutput('No port selected. Select a serial port first.', 'error');
    return;
  }

  // Save and compile first
  if (editor && currentFilePath) {
    const tab = openTabs.find(t => t.path === currentFilePath);
    if (tab && tab.modified) await autoSave();
  }

  const board = $boardSelect.value;
  appendOutput('', 'info');
  appendOutput('=== Uploading ' + currentProject + ' to ' + port + ' ===', 'info');

  const response = await kateAPI('upload project ' + currentProject + ' to ' + port + ' board=' + board);
  parseAndAppendOutput(response, 'Upload');
}

// ── Port scanning ─────────────────────────────────────────
async function refreshPorts() {
  setStatus('busy', 'Scanning ports...');
  const response = await kateAPI('list serial ports');

  $portSelect.innerHTML = '<option value="">No Port</option>';
  if (!response) return;

  const lines = response.split('\n');
  for (const line of lines) {
    const trimmed = line.trim();
    // Look for /dev/tty* patterns
    const portMatch = trimmed.match(/(\/dev\/tty\S+)/);
    if (portMatch) {
      const opt = document.createElement('option');
      opt.value = portMatch[1];
      opt.textContent = portMatch[1];
      // Add description if available
      const desc = trimmed.replace(portMatch[1], '').trim().replace(/^[-–—:\s]+/, '');
      if (desc) opt.textContent += ' (' + desc + ')';
      $portSelect.appendChild(opt);
    }
    // Also look for COM port patterns (Windows)
    const comMatch = trimmed.match(/(COM\d+)/);
    if (comMatch && !portMatch) {
      const opt = document.createElement('option');
      opt.value = comMatch[1];
      opt.textContent = comMatch[1];
      $portSelect.appendChild(opt);
    }
  }
}

  document.body.style.userSelect = 'none';

  const startY = e.clientY;
  const startHeight = $outputPanel.offsetHeight;

  function onMove(e) {
    const delta = startY - e.clientY;
    const newHeight = Math.max(32, Math.min(window.innerHeight - 200, startHeight + delta));
    $outputPanel.style.height = newHeight + 'px';
    outputHeight = newHeight;
    if (editor) editor.layout();
  }

  function onUp() {
    isResizing = false;
    $resizeHandle.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    if (editor) editor.layout();
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});
